# Do not under any circumstances add approvedGitRepositories to this file.
# It is a security risk that would allow arbitrary code execution both locally and in CI.
# https://yarnpkg.com/configuration/yarnrc#approvedGitRepositories


# Use a real node_modules tree (not PnP): build (tsc) and deploy (symlinking
# dist/opencode/index.js) expect resolvable on-disk modules.
nodeLinker: node-modules

# Keep the package cache inside the repo (gitignored) instead of the global
# ~/.local/share/yarn cache.
enableGlobalCache: false

# Supply-chain hardening (Node.js Supply Chain Security Hardening Guide):
# disable install scripts, enforce lockfile immutability, and gate on a
# minimum package release age of 3 days (4320 minutes).
enableScripts: false
enableImmutableInstalls: true
npmMinimalAgeGate: 4320
